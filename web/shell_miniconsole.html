<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MiniConsole (Web)</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f17;
      --panel: #121a28;
      --line: #26324a;
      --text: #e6edf9;
      --muted: #94a4bf;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(1200px 500px at 70% 0%, #13243d 0%, var(--bg) 60%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .layout {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 12px;
      box-sizing: border-box;
    }
    .header, .footer {
      background: color-mix(in srgb, var(--panel) 85%, transparent);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: .2px;
    }
    .header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .canvas-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #06090f;
      display: grid;
      place-items: center;
      min-height: 320px;
    }
    canvas {
      width: min(100%, 960px);
      height: auto;
      aspect-ratio: 4 / 3;
      image-rendering: auto;
      outline: none;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
    }
    progress {
      width: 220px;
      height: 12px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="header">
      <h1>MiniConsole — WebAssembly Build</h1>
      <p>Use keyboard focus on the canvas before playing. Assets are preloaded from the packaged levels folder.</p>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>
    <div class="footer">
      <div id="status">Downloading...</div>
      <progress id="progress" max="100" value="0"></progress>
    </div>
  </div>

  <script>
    var statusElement = document.getElementById('status');
    var progressElement = document.getElementById('progress');
    var Module = {
      canvas: document.getElementById('canvas'),
      setStatus: function(text) {
        statusElement.textContent = text;
      },
      monitorRunDependencies: function(left) {
        if (left > 0) {
          statusElement.textContent = 'Preparing files...';
        } else {
          statusElement.textContent = 'Ready';
          progressElement.value = 100;
        }
      }
    };

    window.addEventListener('error', function(event) {
      statusElement.textContent = 'Runtime error: ' + event.message;
    });
  </script>
  {{{ SCRIPT }}}
</body>
</html>
