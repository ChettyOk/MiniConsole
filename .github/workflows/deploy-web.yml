name: Deploy Web Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.74"

      - name: Cache SFML install
        id: cache-sfml
        uses: actions/cache@v4
        with:
          path: sfml-install
          key: vrsfml-main-web-v11-${{ runner.os }}

      - name: Build VRSFML for Emscripten
        if: steps.cache-sfml.outputs.cache-hit != 'true'
        run: |
          ./scripts/build_vrsfml_web.sh

      - name: Build MiniConsole web artifacts
        run: |
          ./scripts/build_web.sh

      - name: Show generated web build
        run: |
          ls -R build-web

      - name: Assemble static site
        run: |
          ./scripts/package_web_site.sh

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4