name: Deploy Web Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.74"

      - name: Cache SFML install
        id: cache-sfml
        uses: actions/cache@v4
        with:
          path: sfml-install
          key: vrsfml-3.0.2-web-v10-${{ runner.os }}

      - name: Build VRSFML for Emscripten
        if: steps.cache-sfml.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 3.0.2 --recurse-submodules https://github.com/vittorioromeo/VRSFML.git sfml-src

          emcmake cmake -S sfml-src -B sfml-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/sfml-install" \
            -DBUILD_SHARED_LIBS=OFF \
            -DSFML_USE_SYSTEM_DEPS=OFF \
            -DSFML_BUILD_AUDIO=OFF \
            -DSFML_BUILD_NETWORK=OFF \
            -DSFML_BUILD_EXAMPLES=OFF \
            -DSFML_BUILD_TEST_SUITE=OFF \
            -DSFML_BUILD_GLUTILS=OFF

          cmake --build sfml-build --target install -j4

      - name: Configure MiniConsole web build
        run: |
          emcmake cmake -S . -B build-web \
            -DCMAKE_BUILD_TYPE=Release \
            -DSFML_STATIC_LIBRARIES=ON \
            -DSFML_DIR="$GITHUB_WORKSPACE/sfml-install/lib/cmake/SFML"

      - name: Build MiniConsole web artifacts
        run: |
          cmake --build build-web -j4
          ls -R build-web

      - name: Assemble static site
        run: |
          mkdir -p site
          touch site/.nojekyll

          HTML_FILE=$(find build-web -name "*.html" | head -n 1)
          JS_FILE=$(find build-web -name "*.js" | head -n 1)
          WASM_FILE=$(find build-web -name "*.wasm" | head -n 1)
          DATA_FILE=$(find build-web -name "*.data" | head -n 1)

          cp "$HTML_FILE" site/index.html
          cp "$JS_FILE" site/
          cp "$WASM_FILE" site/

          if [ -n "$DATA_FILE" ]; then
            cp "$DATA_FILE" site/
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4