name: Deploy Web Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.37"          # pinned — change only after testing locally

      - name: Cache SFML install
        id: cache-sfml               # id required so next step can read cache-hit
        uses: actions/cache@v4
        with:
          path: sfml-install
          key: vrsfml-web-main-v3-${{ runner.os }}

      - name: Build VRSFML for Emscripten
        if: steps.cache-sfml.outputs.cache-hit != 'true'   # skip when cache restored
        run: |
          git clone --depth 1 --recurse-submodules https://github.com/vittorioromeo/VRSFML.git sfml-src
          emcmake cmake -S sfml-src -B sfml-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/sfml-install" \
            -DBUILD_SHARED_LIBS=OFF \
            -DSFML_USE_SYSTEM_DEPS=OFF \
            -DSFML_BUILD_AUDIO=OFF \
            -DSFML_BUILD_NETWORK=OFF \
            -DSFML_BUILD_EXAMPLES=OFF \
            -DSFML_BUILD_TEST_SUITE=OFF
          cmake --build sfml-build --target install -j 4

      - name: Configure MiniConsole web build
        run: |
          emcmake cmake -S . -B build-web \
            -DCMAKE_BUILD_TYPE=Release \
            -DSFML_STATIC_LIBRARIES=ON \
            -DSFML_DIR="$GITHUB_WORKSPACE/sfml-install/lib/cmake/SFML"

      - name: Build MiniConsole web artifacts
        run: cmake --build build-web -j 4

      - name: Assemble static site
        run: |
          mkdir -p site

          # Suppress Jekyll processing — prevents Pages stripping _ prefixed files
          touch site/.nojekyll

          cp build-web/miniconsole.html site/index.html
          cp build-web/miniconsole.js   site/
          cp build-web/miniconsole.wasm site/

          # .data only exists when assets are preloaded via --preload-file
          if [ -f build-web/miniconsole.data ]; then
            cp build-web/miniconsole.data site/
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:                     # explicit on the job that writes to Pages
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4